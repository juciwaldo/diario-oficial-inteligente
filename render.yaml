# render.yaml — Configuração de Deploy para Render.com
services:
  - type: web
    name: diario-inteligente-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
